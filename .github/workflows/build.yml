name: Build iOS

on:
  push:
    branches: [ "master", "fixbug-synatx" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    name: Build and check errors
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: List Xcode versions
        run: ls /Applications/Xcode*.app/Contents/Developer/usr/bin/xcodebuild 2>/dev/null; ls /Applications/Xcode*.app 2>/dev/null | head -10

      - name: Select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE_PATH" ]; then
            sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          fi
          xcodebuild -version

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -project MediaMate.xcodeproj \
            -scheme MediaMate \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -configuration Debug \
            -quiet \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            2>&1

      - name: Show errors if build failed
        if: failure()
        run: |
          xcodebuild build \
            -project MediaMate.xcodeproj \
            -scheme MediaMate \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            2>&1 | grep -E "error:|warning:" | head -30
