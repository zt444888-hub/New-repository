name: Build & Archive

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build and Archive
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Build
        run: |
          xcodebuild clean archive \
            -project MediaMate.xcodeproj \
            -scheme MediaMate \
            -configuration Release \
            -archivePath $RUNNER_TEMP/MediaMate.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MediaMate.xcarchive
          path: ${{ runner.temp }}/MediaMate.xcarchive
